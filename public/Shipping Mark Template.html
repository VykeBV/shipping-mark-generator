<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vyke Create · Shipping Mark Generator</title>
<!-- Discourage HTML caching while we're iterating quickly. GitHub Pages
     serves with `Cache-Control: max-age=600`, which means browsers
     would happily run an outdated barcode.jsx for up to 10 minutes
     after each deploy. The script tags below also carry a `?v=N`
     query string — bump it whenever any of the linked .jsx files
     change to force every browser to refetch. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    height: 100vh;
    width: 100vw;
    font-family: "Roboto", system-ui, -apple-system, "Segoe UI", sans-serif;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(157,201,232,.05), transparent 60%),
      #2b2d31;
    color: #fff;
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    /* Body background covers the FULL viewport (extends behind the
       floating Tweaks panel). The interactive .stage is positioned
       absolutely inside, inset from the right so it never overlaps
       the panel. See .stage rules below. */
  }
  /* Stage = the canvas viewport (Illustrator-style infinite workspace).
     Fills the body's content area via flex:1; overflow: hidden clips
     anything outside its bounds. The card inside floats freely — both
     the translate (pan) and scale (zoom) are CSS transforms applied
     to the .shipping-mark element directly, so the card can sit
     anywhere in viewport space. There are no scrollbars because the
     pan space is unbounded (just transform offsets). */
  .stage {
    /* Absolutely positioned to fill the viewport EXCEPT the right
       320 px (panel sidebar) and the top 56 px (header). The body's
       dark background still extends behind both, so visually the
       canvas spans the full screen but the interactive surface
       stays clear of the fixed chrome. */
    position: absolute;
    top: 56px;                    /* clear of the .vyke-header bar */
    bottom: 0;
    left: 0;
    right: 320px;                 /* clear of the right-edge sidebar */
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* ─── Top application header ─────────────────────────────────────
     Fixed bar pinned to the top of the viewport. Holds the Vyke
     Create logo on the left, the export menu and account chip on
     the right. Replaces what used to live in the Tweaks panel
     header + at the top/bottom of its body. Sits ABOVE all other
     fixed UI so banners, warnings, zoom-nav etc. tuck under it. */
  .vyke-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    /* Above the Tweaks panel (which sets z-index: 2147483646 from
       tweaks-panel.jsx) so the Export dropdown can open downwards
       over the panel without getting clipped. */
    z-index: 2147483647;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.06), rgba(157, 201, 232, 0) 80%),
      rgba(18, 19, 23, 0.92);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
    font: 12px/1.4 "Inter", "Roboto", system-ui, -apple-system, sans-serif;
  }
  body.vyke-locked .vyke-header { filter: blur(3px) brightness(0.55); pointer-events: none; }
  .vyke-header-logo {
    width: 140px;
    height: 32px;
    background-image: url("vyke-create-logo.png");
    background-size: contain;
    background-position: left center;
    background-repeat: no-repeat;
    filter: drop-shadow(0 1px 10px rgba(157, 201, 232, 0.18));
  }
  .vyke-header-spacer { flex: 1; }

  /* Shared header-button shape — every interactive element in the
     header (Presets, Export, Account chip) follows the same height,
     border-radius, padding, and font so they align in a clean row.
     Variants below only change the colour treatment. */
  .vyke-export-wrap { position: relative; }
  .vyke-header-btn,
  .vyke-export-trigger,
  .vyke-header .vyke-acc-chip {
    box-sizing: border-box;
    height: 36px;
    padding: 0 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    font: 500 12px/1 "Inter", "Roboto", system-ui, -apple-system, sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease, color .12s ease;
    /* Subtle, on-brand focus ring instead of the browser default
       (which extends past the box and breaks visual alignment). */
    outline: none;
  }
  .vyke-header-btn:focus-visible,
  .vyke-export-trigger:focus-visible,
  .vyke-header .vyke-acc-chip:focus-visible {
    box-shadow: 0 0 0 2px rgba(157, 201, 232, 0.55);
    border-color: rgba(157, 201, 232, 0.55);
  }

  /* Primary action — blue-accent Export button. */
  .vyke-export-trigger {
    border-color: rgba(157, 201, 232, 0.32);
    background: rgba(157, 201, 232, 0.10);
    color: #cfe4f3;
    font-weight: 600;
  }
  .vyke-export-trigger:hover {
    background: rgba(157, 201, 232, 0.18);
    border-color: rgba(157, 201, 232, 0.55);
  }
  .vyke-export-trigger svg,
  .vyke-header-btn svg {
    width: 14px; height: 14px;
    flex-shrink: 0;
  }
  .vyke-export-trigger .vyke-export-chev,
  .vyke-header-btn .vyke-export-chev {
    width: 9px; height: 9px;
    opacity: 0.6;
    margin-left: 2px;
  }
  .vyke-export-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    /* Wide enough for the longest label ('Batch CSV → multi-page PDF')
       to stay on one line, plus its small sub-label on the right. */
    min-width: 360px;
    white-space: nowrap;
    background: rgba(18, 19, 23, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    z-index: 41;
  }
  .vyke-export-menu[hidden] { display: none; }
  .vyke-export-menu button {
    appearance: none;
    border: 0;
    background: transparent;
    color: rgba(255, 255, 255, 0.88);
    text-align: left;
    padding: 9px 12px;
    border-radius: 6px;
    font: 500 12px/1.3 inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background .12s;
  }
  .vyke-export-menu button:hover {
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
  }
  .vyke-export-menu button.is-primary {
    background: rgba(157, 201, 232, 0.14);
    color: #e7f1f8;
  }
  .vyke-export-menu button.is-primary:hover {
    background: rgba(157, 201, 232, 0.22);
  }
  .vyke-export-menu .vyke-export-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.06);
    margin: 4px 0;
  }
  .vyke-export-menu small {
    display: block;
    font-size: 10.5px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 2px;
  }

  /* Secondary header button (Presets). Same SHAPE as Export — the
     shared block above sets height / padding / border-radius / font.
     Only the colour treatment differs (neutral grey instead of blue
     accent) so the primary action (Export) still reads as the most
     important thing in the header. */
  .vyke-header-btn {
    border-color: rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.88);
  }
  .vyke-header-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.20);
    color: #fff;
  }

  /* Presets popover — wraps the existing PresetsPanel component
     (save row + scrollable preset list with thumbnails). Wider and
     taller than the Export menu to give the list breathing room. */
  .vyke-presets-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 360px;
    max-height: 70vh;
    overflow-y: auto;
    background: rgba(18, 19, 23, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    z-index: 41;
    /* Subtle scroll thumb matching the rest of the dark chrome */
    scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
    scrollbar-width: thin;
  }
  .vyke-presets-menu[hidden] { display: none; }
  .vyke-presets-menu::-webkit-scrollbar { width: 8px; }
  .vyke-presets-menu::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.18);
    border-radius: 4px;
  }
  /* Force the preset-row buttons / fields into dark-mode contrast — the
     existing .vyke-pre-* CSS is light-mode by default (designed for the
     Tweaks panel which had its own dark-text overrides). */
  .vyke-presets-menu .twk-field,
  .vyke-presets-menu input.twk-field {
    background: rgba(255, 255, 255, 0.04) !important;
    border: 1px solid rgba(255, 255, 255, 0.10) !important;
    color: rgba(255, 255, 255, 0.92) !important;
  }
  .vyke-presets-menu .twk-btn {
    background: rgba(157, 201, 232, 0.18) !important;
    color: #e7f1f8 !important;
  }
  .vyke-presets-menu .twk-btn:hover { background: rgba(157, 201, 232, 0.30) !important; }
  .vyke-presets-menu .twk-tip {
    color: rgba(255, 255, 255, 0.62);
    font-size: 11px;
  }
  .vyke-presets-menu .vyke-pre-name { color: rgba(255, 255, 255, 0.92); }
  .vyke-presets-menu .vyke-pre-time { color: rgba(255, 255, 255, 0.5); }
  .vyke-presets-menu .vyke-pre-empty { color: rgba(255, 255, 255, 0.55); }

  /* Feedback button variant — green tint so it reads as a friendly
     "we want to hear from you" affordance, distinct from the blue
     Export primary and the neutral Presets button. Same dark-glass
     dimensions as the other header buttons (shared shape rule above);
     only the colour treatment differs. */
  .vyke-header-btn--feedback {
    border-color: rgba(120, 200, 140, 0.35) !important;
    background: rgba(120, 200, 140, 0.10) !important;
    color: #c9ecd3 !important;
  }
  .vyke-header-btn--feedback:hover {
    background: rgba(120, 200, 140, 0.20) !important;
    border-color: rgba(120, 200, 140, 0.55) !important;
    color: #fff !important;
  }

  /* Feedback popover — same dark-glass treatment as Presets / Export,
     anchored top-right under the Feedback button. Slightly narrower
     than presets (no scrollable list) and fixed-height (the textarea
     does its own vertical sizing via rows=5). */
  .vyke-feedback-pop {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 340px;
    background: rgba(18, 19, 23, 0.96);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    z-index: 41;
    font-family: "Inter", "Roboto", system-ui, -apple-system, sans-serif;
  }
  .vyke-feedback-title {
    font: 600 13px/1.3 inherit;
    color: rgba(255, 255, 255, 0.95);
  }
  .vyke-feedback-pitch {
    font: 400 11.5px/1.5 inherit;
    color: rgba(255, 255, 255, 0.65);
    margin: 0;
  }
  .vyke-feedback-pop form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .vyke-feedback-text {
    width: 100%;
    box-sizing: border-box;
    resize: vertical;
    min-height: 96px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.10);
    color: rgba(255, 255, 255, 0.92);
    border-radius: 8px;
    padding: 10px 11px;
    font: 400 12px/1.45 inherit;
    outline: none;
    transition: border-color .12s ease, background .12s ease;
  }
  .vyke-feedback-text::placeholder {
    color: rgba(255, 255, 255, 0.38);
  }
  .vyke-feedback-text:focus {
    border-color: rgba(157, 201, 232, 0.55);
    background: rgba(255, 255, 255, 0.06);
  }
  .vyke-feedback-text:disabled { opacity: 0.6; }
  .vyke-feedback-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .vyke-feedback-meta {
    font: 400 10.5px/1.3 inherit;
    color: rgba(255, 255, 255, 0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .vyke-feedback-meta b {
    font-weight: 600;
    color: rgba(255, 255, 255, 0.78);
  }
  .vyke-feedback-send {
    appearance: none;
    border: 1px solid rgba(157, 201, 232, 0.55);
    background: rgba(157, 201, 232, 0.18);
    color: #e7f1f8;
    font: 600 12px/1 inherit;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
    flex-shrink: 0;
  }
  .vyke-feedback-send:hover:not(:disabled) {
    background: rgba(157, 201, 232, 0.30);
    border-color: rgba(157, 201, 232, 0.75);
  }
  .vyke-feedback-send:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .vyke-feedback-status {
    font: 500 11px/1.4 inherit;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
  }
  .vyke-feedback-status.is-ok {
    background: rgba(120, 200, 140, 0.12);
    border-color: rgba(120, 200, 140, 0.35);
    color: #c9ecd3;
  }
  .vyke-feedback-status.is-err {
    background: rgba(232, 110, 110, 0.12);
    border-color: rgba(232, 110, 110, 0.35);
    color: #f3c7c7;
  }

  /* Account chip inside the header — inherits the shared header-btn
     shape above (height 36 / padding 14 / radius 8 / 12 px font).
     The original .vyke-acc-chip (account-chip.jsx) was designed for
     a stacked sidebar layout: width:100%, padding 7×9, margin 0 0 8,
     border-radius 10, font 11.5/1. All of those need overriding in
     the header context — otherwise the chip's bottom margin pushes
     it visually higher than its siblings AND the different padding /
     border-radius make it look like a different shape. */
  .vyke-header .vyke-acc-wrap { width: auto; }
  .vyke-header .vyke-acc-chip {
    width: auto !important;
    margin: 0 !important;
    padding: 0 12px 0 6px !important;
    border-radius: 8px !important;
    background: rgba(255, 255, 255, 0.04) !important;
    border-color: rgba(255, 255, 255, 0.10) !important;
    color: rgba(255, 255, 255, 0.88) !important;
    font: 500 12px/1 "Inter", "Roboto", system-ui, -apple-system, sans-serif !important;
  }
  .vyke-header .vyke-acc-chip:hover {
    background: rgba(255, 255, 255, 0.08) !important;
    border-color: rgba(255, 255, 255, 0.20) !important;
    color: #fff !important;
  }
  /* Slightly larger avatar so it visually balances the text + dot
     within the 36 px chip (the 22 px default looked small next to
     the bolder header text). */
  .vyke-header .vyke-acc-avatar {
    width: 24px; height: 24px;
    font-size: 12px;
  }
  @media (max-width: 768px) {
    .stage {
      /* On mobile the panel docks at the bottom (no right reserve);
         the existing mobile media query further down overrides this
         with `position: fixed; top: 48px; height: 30vh` for the
         topbar layout. */
      right: 0;
    }
  }
  /* The shipping-mark card is the only flow child of .stage and gets
     flex-centred. flex-shrink: 0 keeps it at its natural mm size even
     when the stage shrinks below the card's intrinsic dimensions
     (otherwise flex would compress it). */
  .stage > .shipping-mark { flex-shrink: 0; }

  /* Cursor states:
     - Default canvas hover: grab (you can drag the empty area).
     - Space held: grab cursor everywhere on the canvas, even over
       editable text — the spacebar puts us in "hand tool" mode and
       the cursor reflects that.
     - Actively panning: grabbing.
     The hover rule deliberately doesn't fight :focus or text-cursor
     states inside .editable elements; .is-space-held overrides those
     via the descendant selector. */
  .stage:not(.is-panning):not(.is-space-held):hover { cursor: grab; }
  .stage.is-space-held,
  .stage.is-space-held * { cursor: grab !important; }
  .stage.is-panning,
  .stage.is-panning * { cursor: grabbing !important; }
  /* When pointer is over an editable / button / input, restore normal cursor */
  .stage .editable:hover,
  .stage button:hover,
  .stage input:hover { cursor: text; }
  .stage button:hover { cursor: pointer; }

  /* ─── Canvas navigation (zoom + pan controls) ─────────────────────
     Centred at the bottom of the viewport (between the page's left
     edge and the Tweaks panel), mirroring the dev banner at top
     centre. Buttons: zoom out, zoom percentage (click to reset to
     fit-to-screen), zoom in. Same dark glass treatment as the
     Tweaks panel for visual consistency. */
  .canvas-nav {
    position: fixed;
    bottom: 14px;
    left: 14px;
    right: 332px;                /* clear of the 320 px Tweaks panel + gap */
    margin-left: auto;
    margin-right: auto;
    width: fit-content;
    max-width: 100%;
    z-index: 16;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 4px;
    background: rgba(18, 19, 23, 0.88);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    backdrop-filter: blur(12px) saturate(140%);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.30);
    font-family: "Inter", "Roboto", system-ui, -apple-system, sans-serif;
  }
  .canvas-nav button {
    appearance: none;
    border: 0;
    background: transparent;
    color: rgba(255, 255, 255, 0.78);
    font: 500 12px/1 inherit;
    padding: 7px 10px;
    border-radius: 7px;
    cursor: pointer;
    min-width: 32px;
    transition: background .12s ease, color .12s ease;
  }
  .canvas-nav button:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.08);
    color: #fff;
  }
  .canvas-nav button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .canvas-nav .canvas-nav-pct {
    min-width: 52px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  body.vyke-locked .canvas-nav { display: none; }
  @media (max-width: 768px) {
    .canvas-nav {
      bottom: auto;
      top: 56px;                       /* below the dev banner on mobile */
      right: 14px;                     /* no Tweaks panel on mobile */
    }
  }
  .mobile-topbar { display: none; }

  /* ─── Vyke Create dark Tweaks panel (identical to Data Sheet creator) ─ */
  .twk-panel {
    background: rgba(18, 19, 23, 0.94) !important;
    color: rgba(255, 255, 255, 0.92) !important;
    /* Fixed right-edge SIDEBAR (not a floating window) — flush with
       the viewport's right edge, full-height from below the header
       to the very bottom. Only a left border separates it from the
       canvas. No rounded right edge, no drop shadow on the right. */
    border: 0 !important;
    border-left: 1px solid rgba(255, 255, 255, 0.06) !important;
    border-radius: 0 !important;
    -webkit-backdrop-filter: blur(28px) saturate(140%) !important;
    backdrop-filter: blur(28px) saturate(140%) !important;
    box-shadow: -12px 0 40px rgba(0, 0, 0, 0.30) !important;
    width: 320px !important;
    font: 11.5px/1.4 "Inter", "Roboto", system-ui, -apple-system, sans-serif !important;
    /* Pinned to the right edge from the header bottom (56 px) down
       to the viewport bottom. Tweaks-panel.jsx still sets
       right/bottom inline, so override them with explicit values. */
    right: 0 !important;
    top: 56px !important;
    bottom: 0 !important;
    left: auto !important;
    height: auto !important;
    max-height: calc(100vh - 56px) !important;
  }
  /* Panel header (logo + close X) is now redundant — the global header
     bar shows both. Hide the entire .twk-hd block so the panel goes
     straight into its first content section. */
  .twk-panel .twk-hd { display: none !important; }
  .twk-panel .twk-x {
    color: rgba(255, 255, 255, 0.55) !important;
    background: rgba(255, 255, 255, 0.04) !important;
    z-index: 1;
  }
  .twk-panel .twk-x:hover {
    color: #fff !important;
    background: rgba(157, 201, 232, 0.18) !important;
  }
  .twk-panel .twk-body {
    padding: 4px 16px 16px !important;
    scrollbar-color: rgba(157, 201, 232, 0.2) transparent !important;
  }
  .twk-panel .twk-body::-webkit-scrollbar-thumb {
    background: rgba(157, 201, 232, 0.18) !important;
  }
  .twk-panel .twk-sect {
    color: #9DC9E8 !important;
    font-weight: 700 !important;
    letter-spacing: 0.12em !important;
    font-size: 9.5px !important;
    padding-top: 14px !important;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    margin-top: 6px;
  }
  .twk-panel .twk-sect:first-child { border-top: 0; margin-top: 0; padding-top: 8px !important; }

  /* ─── Collapsible section (accordion) ─────────────────────────────
     Each TweakSection in the panel becomes a fold-open MENU ROW.
     Closed by default — headers stack like a tidy menu the user can
     fold open one at a time. Open state per section is remembered
     in sessionStorage so it persists across edits. */
  .twk-panel .twk-coll {
    /* Full-width row — negate .twk-body's 16 px horizontal padding so
       the header hover state and divider line stretch edge-to-edge. */
    margin: 0 -16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }
  .twk-panel .twk-coll:first-child { border-top: 1px solid rgba(255, 255, 255, 0.06); }
  .twk-panel .twk-coll-hd {
    appearance: none;
    border: 0;
    background: transparent;
    color: rgba(255, 255, 255, 0.92);
    width: 100%;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    /* Larger, normal-case text reads as a menu row (the previous
       eyebrow-style ALL-CAPS at 9.5 px looked like a label header
       rather than a clickable control). */
    font: 600 12.5px/1.2 "Inter", "Roboto", system-ui, -apple-system, sans-serif;
    letter-spacing: 0.01em;
    text-transform: none;
    transition: background .12s, color .12s;
  }
  .twk-panel .twk-coll-hd:hover {
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
  }
  /* When a section is open, accent the header so it's clearly the
     active group. */
  .twk-panel .twk-coll.is-open > .twk-coll-hd {
    color: #9DC9E8;
    background: rgba(157, 201, 232, 0.06);
  }
  .twk-panel .twk-coll-label { flex: 1; text-align: left; }
  .twk-panel .twk-coll-chev {
    color: rgba(255, 255, 255, 0.45);
    font-size: 11px;
    line-height: 1;
    transform: rotate(-90deg);
    transition: transform .18s cubic-bezier(.3,.7,.4,1), color .12s;
    margin-left: 10px;
  }
  .twk-panel .twk-coll.is-open .twk-coll-chev {
    transform: rotate(0deg);
    color: #9DC9E8;
  }
  .twk-panel .twk-coll-hd:hover .twk-coll-chev { color: rgba(255, 255, 255, 0.85); }
  .twk-panel .twk-coll-body {
    padding: 6px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    /* Subtle inset so the opened body reads as 'belongs to' the
       header above it. */
    background: rgba(255, 255, 255, 0.015);
  }
  /* Sub-section eyebrow inside a collapsible body (used by the
     Advanced section to group its own subgroups: Row text size,
     Logo, Barcode dimensions, Per-icon sizes). Smaller and less
     prominent than the section header, so the hierarchy reads as
     "Section header → sub-eyebrows → controls". */
  .twk-panel .twk-coll-body .twk-sect {
    color: #9DC9E8 !important;
    font: 700 9.5px/1 "Inter", "Roboto", sans-serif !important;
    letter-spacing: 0.12em !important;
    text-transform: uppercase !important;
    padding: 12px 0 4px !important;
    margin: 0 !important;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .twk-panel .twk-coll-body .twk-sect:first-child {
    border-top: 0;
    padding-top: 4px !important;
  }

  /* ─── Pro variant ("Advanced") ───────────────────────────────────
     Section flagged with variant="pro" — its header is restyled to
     look like the old standalone .twk-pro-trigger button (outlined
     blue card with a chevron) instead of the flat menu-row treatment
     the other sections use. Visually marks Advanced as a separate
     "expert" affordance while it still lives inline in the sidebar.
     We override the .twk-coll edge-to-edge full-bleed wrapper so the
     button sits with a comfortable margin around it. */
  .twk-panel .twk-coll--pro {
    margin: 14px 0 4px;
    border: 0;
    padding: 0 4px;
  }
  .twk-panel .twk-coll--pro + .twk-coll,
  .twk-panel .twk-coll--pro:first-child { border-top: 0; }
  .twk-panel .twk-coll--pro > .twk-coll-hd {
    border-radius: 8px;
    border: 1px solid rgba(157, 201, 232, 0.28);
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.06), rgba(157, 201, 232, 0.02));
    color: #9DC9E8;
    font: 700 11px/1 "Inter", "Roboto", system-ui, sans-serif;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 11px 14px;
    transition: background .14s ease, border-color .14s ease, color .14s ease;
  }
  /* Gear icon before the label — uses mask-image so the icon's fill
     inherits the header's current text color (blue when closed,
     brighter blue on hover, white when open). Same gear silhouette
     the old standalone .twk-pro-trigger button used. */
  .twk-panel .twk-coll--pro > .twk-coll-hd::before {
    content: "";
    width: 13px;
    height: 13px;
    margin-right: 8px;
    display: inline-block;
    flex-shrink: 0;
    background-color: currentColor;
    -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'><path d='M8 5.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6zM13.5 8a5.6 5.6 0 0 0-.1-1l1.4-1-1.4-2.4-1.7.6a5.4 5.4 0 0 0-1.7-1L9.7.6H6.4l-.3 1.7a5.4 5.4 0 0 0-1.7 1l-1.7-.6L1.3 5.1l1.4 1a5.6 5.6 0 0 0 0 2L1.3 9l1.4 2.4 1.7-.6a5.4 5.4 0 0 0 1.7 1l.3 1.7h3.3l.3-1.7a5.4 5.4 0 0 0 1.7-1l1.7.6L14.7 9l-1.4-1a5.6 5.6 0 0 0 .1-1z'/></svg>");
            mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='black' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'><path d='M8 5.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6zM13.5 8a5.6 5.6 0 0 0-.1-1l1.4-1-1.4-2.4-1.7.6a5.4 5.4 0 0 0-1.7-1L9.7.6H6.4l-.3 1.7a5.4 5.4 0 0 0-1.7 1l-1.7-.6L1.3 5.1l1.4 1a5.6 5.6 0 0 0 0 2L1.3 9l1.4 2.4 1.7-.6a5.4 5.4 0 0 0 1.7 1l.3 1.7h3.3l.3-1.7a5.4 5.4 0 0 0 1.7-1l1.7.6L14.7 9l-1.4-1a5.6 5.6 0 0 0 .1-1z'/></svg>");
    -webkit-mask-size: contain;
            mask-size: contain;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: center;
            mask-position: center;
  }
  .twk-panel .twk-coll--pro > .twk-coll-hd:hover {
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.14), rgba(157, 201, 232, 0.06));
    border-color: rgba(157, 201, 232, 0.55);
    color: #BCE0F2;
  }
  .twk-panel .twk-coll--pro.is-open > .twk-coll-hd {
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.22), rgba(157, 201, 232, 0.10));
    border-color: #9DC9E8;
    color: #fff;
  }
  /* Chevron sits to the right of the label, same orientation logic
     (rotated -90° closed, 0° open) as the standard accordion. */
  .twk-panel .twk-coll--pro > .twk-coll-hd .twk-coll-chev {
    color: rgba(157, 201, 232, 0.7);
  }
  .twk-panel .twk-coll--pro.is-open > .twk-coll-hd .twk-coll-chev {
    color: #fff;
  }
  /* Body of the pro section uses the standard inset treatment but
     with no top border on the first sub-section (since the button
     itself already provides a visual boundary). */
  .twk-panel .twk-coll--pro > .twk-coll-body {
    background: transparent;
    padding: 10px 12px 14px;
  }

  /* ─── Content rows table ───────────────────────────────────────────
     Compact inline editor for the row labels + values. One row per
     content row: [label input] [value input] [×] — easier to scan
     and re-order in your head than editing on-canvas only. */
  .vyke-rows-table {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .vyke-rows-head,
  .vyke-rows-row {
    display: grid;
    grid-template-columns: 1fr 1.3fr 26px;
    gap: 4px;
    align-items: center;
  }
  .vyke-rows-head {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.45);
    padding: 2px 4px 4px;
  }
  .vyke-rows-head > :last-child { display: block; }
  .vyke-rows-row .twk-field {
    height: 28px !important;
    font-size: 11.5px !important;
    padding: 0 8px !important;
  }
  .vyke-rows-del {
    appearance: none;
    width: 26px;
    height: 26px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.55);
    border-radius: 6px;
    font: 600 14px/1 inherit;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .vyke-rows-del:hover:not(:disabled) {
    background: rgba(255, 100, 100, 0.18);
    border-color: rgba(255, 100, 100, 0.40);
    color: #ff9a9a;
  }
  .vyke-rows-del:disabled {
    opacity: 0.30;
    cursor: not-allowed;
  }

  .twk-panel .twk-lbl,
  .twk-panel .twk-lbl > span:first-child {
    color: rgba(255, 255, 255, 0.85) !important;
  }
  .twk-panel .twk-val { color: rgba(255, 255, 255, 0.5) !important; }
  .twk-panel .twk-field {
    background: rgba(255, 255, 255, 0.04) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    color: rgba(255, 255, 255, 0.92) !important;
    height: 30px !important;
    border-radius: 8px !important;
  }
  .twk-panel .twk-field:focus {
    border-color: #9DC9E8 !important;
    background: rgba(255, 255, 255, 0.06) !important;
    box-shadow: 0 0 0 3px rgba(157, 201, 232, 0.12) !important;
  }
  /* Number-input dark mode: TweakNumber renders as a .twk-num flex
     container with an <input> inside. Without these overrides the
     light-mode default (white-ish background + brown text) collides
     with the dark panel and the digits become unreadable. Same
     treatment as .twk-field so the W/H inputs match the EAN input. */
  .twk-panel .twk-num {
    background: rgba(255, 255, 255, 0.04) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    height: 30px !important;
    border-radius: 8px !important;
  }
  .twk-panel .twk-num:focus-within {
    border-color: #9DC9E8 !important;
    background: rgba(255, 255, 255, 0.06) !important;
    box-shadow: 0 0 0 3px rgba(157, 201, 232, 0.12) !important;
  }
  .twk-panel .twk-num-lbl  { color: rgba(255, 255, 255, 0.65) !important; }
  .twk-panel .twk-num-unit { color: rgba(255, 255, 255, 0.50) !important; }
  .twk-panel .twk-num input {
    color: rgba(255, 255, 255, 0.95) !important;
    font-weight: 500;
  }
  .twk-panel select.twk-field {
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%239DC9E8' d='M0 0h10L5 6z'/></svg>") !important;
    background-repeat: no-repeat !important;
    background-position: right 10px center !important;
  }
  .twk-panel .twk-seg {
    background: rgba(255, 255, 255, 0.04) !important;
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .twk-panel .twk-seg-thumb {
    background: linear-gradient(180deg, #9DC9E8, #7FB6DC) !important;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset !important;
  }
  .twk-panel .twk-seg button { color: rgba(255, 255, 255, 0.6) !important; font-weight: 600 !important; }
  .twk-panel .twk-seg button[aria-checked="true"] { color: #000 !important; }
  .twk-panel .twk-slider {
    background: rgba(255, 255, 255, 0.08) !important;
  }
  .twk-panel .twk-slider::-webkit-slider-thumb {
    background: #9DC9E8 !important;
    border: 0 !important;
    box-shadow: 0 0 0 4px rgba(157, 201, 232, 0.15), 0 2px 6px rgba(0, 0, 0, 0.4) !important;
  }
  .twk-panel .twk-slider::-moz-range-thumb {
    background: #9DC9E8 !important;
    border: 0 !important;
  }
  .twk-panel .twk-toggle {
    background: rgba(255, 255, 255, 0.1) !important;
  }
  .twk-panel .twk-toggle[aria-checked="true"] {
    background: #9DC9E8 !important;
  }
  .twk-panel .twk-toggle .twk-toggle-thumb,
  .twk-panel .twk-toggle > span {
    background: #fff !important;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.4) !important;
  }
  .twk-panel .twk-chip {
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    box-shadow: 0 0 0 2px transparent !important;
  }
  .twk-panel .twk-chip[aria-checked="true"] {
    border-color: #9DC9E8 !important;
    box-shadow: 0 0 0 2px rgba(157, 201, 232, 0.35) !important;
  }
  .twk-panel .twk-btn {
    background: linear-gradient(180deg, #9DC9E8, #7FB6DC) !important;
    color: #000 !important;
    font-weight: 700 !important;
    letter-spacing: 0.02em !important;
    border: 0 !important;
    border-radius: 8px !important;
    padding: 8px 12px !important;
    box-shadow: 0 4px 14px rgba(157, 201, 232, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.06) inset !important;
    transition: transform .08s ease, box-shadow .15s ease;
  }
  .twk-panel .twk-btn:hover {
    box-shadow: 0 6px 20px rgba(157, 201, 232, 0.32), 0 0 0 1px rgba(255, 255, 255, 0.1) inset !important;
    transform: translateY(-1px);
  }
  .twk-panel .twk-btn.secondary {
    background: rgba(255, 255, 255, 0.06) !important;
    color: rgba(255, 255, 255, 0.85) !important;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08) inset !important;
    flex: 1;
  }
  .twk-panel .twk-btn.secondary:hover {
    background: rgba(157, 201, 232, 0.12) !important;
    color: #fff !important;
    box-shadow: 0 0 0 1px rgba(157, 201, 232, 0.3) inset !important;
  }
  .twk-tip {
    background: rgba(157, 201, 232, 0.06) !important;
    border: 1px solid rgba(157, 201, 232, 0.12) !important;
    border-radius: 8px;
    padding: 10px 12px !important;
    color: rgba(255, 255, 255, 0.72) !important;
    line-height: 1.55;
  }
  .twk-tip b { color: #9DC9E8 !important; font-weight: 600; }

  /* Red warning card — surfaced when icons would overflow the trim
     region at the user's chosen size. Same shape as .twk-tip but
     red-tinted so it reads as an actual problem, not a hint. */
  .twk-warning {
    background: rgba(255, 90, 90, 0.10) !important;
    border: 1px solid rgba(255, 90, 90, 0.42) !important;
    border-radius: 8px;
    padding: 10px 12px;
    color: rgba(255, 200, 200, 0.92);
    font-size: 11px;
    line-height: 1.5;
  }
  .twk-warning b { color: #ffb0b0; font-weight: 700; }
  .twk-warning-action {
    appearance: none;
    border: 1px solid rgba(255, 90, 90, 0.55);
    background: rgba(255, 90, 90, 0.18);
    color: #ffd6d6;
    font: 600 10.5px/1 "Inter", "Roboto", system-ui, sans-serif;
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 8px;
    cursor: pointer;
    display: inline-block;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .twk-warning-action:hover {
    background: rgba(255, 90, 90, 0.30);
    border-color: rgba(255, 90, 90, 0.75);
    color: #fff;
  }

  /* ─── Advanced settings trigger ─────────────────────────────────────
     Deliberately styled to NOT look like a toggle — it's a pro
     affordance that opens a side-panel. Outlined card with a gear
     icon and a chevron. */
  .twk-pro-trigger {
    appearance: none;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 9px 12px;
    margin-top: 4px;
    border-radius: 8px;
    border: 1px solid rgba(157, 201, 232, 0.28);
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.06), rgba(157, 201, 232, 0.02));
    color: #9DC9E8;
    font: 700 11px/1 "Inter", "Roboto", system-ui, sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background .14s ease, border-color .14s ease, transform .08s ease;
  }
  .twk-pro-trigger:hover {
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.14), rgba(157, 201, 232, 0.06));
    border-color: rgba(157, 201, 232, 0.55);
    color: #BCE0F2;
  }
  .twk-pro-trigger[aria-expanded="true"] {
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.22), rgba(157, 201, 232, 0.10));
    border-color: #9DC9E8;
    color: #fff;
  }
  .twk-pro-trigger .twk-pro-label { flex: 1; text-align: left; text-transform: uppercase; }
  .twk-pro-trigger .twk-pro-chev {
    font-size: 16px;
    line-height: 1;
    transform: translateY(-1px);
    opacity: 0.7;
  }

  /* ─── Advanced settings side-panel ──────────────────────────────────
     Sits to the LEFT of the main Tweaks panel (so it doesn't cover
     the live preview). Same dark-glass treatment as .twk-panel, but
     with a left-edge accent stripe to mark it as a separate pro
     surface. On mobile it docks as a full-width sheet at the top. */
  .adv-panel {
    position: fixed;
    right: 320px;             /* 320 (.twk-panel width) + 16 gutter */
    /* Docked below the global header bar (56 px + 12 px gap) so it
       lines up with the Tweaks panel beside it. */
    top: 68px;
    bottom: 16px;
    width: 320px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    background: rgba(18, 19, 23, 0.92);
    color: rgba(255, 255, 255, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-left: 3px solid #9DC9E8;
    border-radius: 12px;
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    backdrop-filter: blur(28px) saturate(140%);
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.05) inset,
      0 24px 70px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(157, 201, 232, 0.12);
    font: 11.5px/1.4 "Inter", "Roboto", system-ui, -apple-system, sans-serif;
    overflow: hidden;
    animation: advSlideIn .18s ease;
  }
  @keyframes advSlideIn {
    from { opacity: 0; transform: translateX(8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .adv-hd {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 64px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background:
      linear-gradient(180deg, rgba(157, 201, 232, 0.12), rgba(157, 201, 232, 0) 80%),
      linear-gradient(180deg, #0c0c11, #0a0a0e);
  }
  .adv-hd-pro {
    font: 800 9px/1 "Inter", "Roboto", sans-serif;
    letter-spacing: 0.16em;
    color: #000;
    background: linear-gradient(180deg, #9DC9E8, #7FB6DC);
    padding: 4px 7px;
    border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12) inset;
  }
  .adv-hd-title {
    flex: 1;
    font: 700 12.5px/1 "Inter", "Roboto", sans-serif;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .adv-close {
    appearance: none;
    width: 28px; height: 28px;
    border: 0;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.55);
    font-size: 18px; line-height: 1;
    cursor: pointer;
    transition: background .12s ease, color .12s ease;
  }
  .adv-close:hover { background: rgba(157, 201, 232, 0.18); color: #fff; }
  .adv-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px 18px;
    scrollbar-color: rgba(157, 201, 232, 0.2) transparent;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .adv-body::-webkit-scrollbar-thumb { background: rgba(157, 201, 232, 0.18); }
  .adv-sect {
    color: #9DC9E8;
    font-weight: 700;
    letter-spacing: 0.12em;
    font-size: 9.5px;
    text-transform: uppercase;
    padding-top: 10px;
    margin-top: 4px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }
  .adv-body > .adv-sect:first-child { border-top: 0; padding-top: 4px; margin-top: 0; }
  .adv-help {
    font-size: 10.5px;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.45;
    padding: 0 2px;
  }
  .adv-empty {
    font-size: 10.5px;
    color: rgba(255, 255, 255, 0.45);
    font-style: italic;
    padding: 4px 2px;
  }
  /* Per-icon row inside the Advanced panel */
  .adv-icon-row {
    display: grid;
    grid-template-columns: 28px 1fr 56px auto;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .adv-icon-thumb {
    width: 24px; height: 24px;
    color: #fff;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 6px;
  }
  .adv-icon-thumb svg { width: 18px; height: 18px; display: block; }
  .adv-icon-meta { min-width: 0; }
  .adv-icon-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.88);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .adv-icon-iso {
    font-size: 9.5px;
    color: rgba(255, 255, 255, 0.45);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .adv-icon-input { width: 56px !important; height: 26px !important; font-size: 11px !important; }
  .adv-icon-unit { color: rgba(255, 255, 255, 0.5); font-size: 10px; }

  /* ─── Dark-mode overrides for tweaks-panel components nested in .adv-panel
     The shared `.twk-*` components were styled for the LIGHT main panel
     (dark text, `color: inherit` inputs). Inside the dark Advanced
     panel that inheritance flips text white onto a near-white input
     fill — invisible. These rules re-skin labels, values, inputs and
     toggles for legibility on the dark surface without touching the
     main panel. */
  .adv-panel .twk-lbl { color: rgba(255, 255, 255, 0.82); }

  .adv-panel .twk-field {

  .twk-footer {

  /* ─── Welcome / sign-in overlay ─────────────────────────────────────

  body.vyke-locked .stage,
  body.vyke-locked .twk-panel,

    place-items: center;

    font: 13px/1.5 "Inter", "Roboto", system-ui, -apple-system, sans-serif;
    color: rgba(255, 255, 255, 0.92);

  .vyke-welcome-card {

  .vyke-welcome-hd {

  .vyke-welcome-logo {

  .vyke-welcome-intro {

  .vyke-welcome-body {

  /* ─── "In development" notice ─────────────────────────────────────────
     Yellow-tinted card so it visually reads as "advisory / heads up,"

     as a floating banner above the canvas so visitors know we're
     actively iterating on the tool while they're using it. */
  .vyke-dev-notice {
    background: rgba(255, 210, 100, 0.10);
    border: 1px solid rgba(255, 210, 100, 0.42);
    border-radius: 8px;

    color: rgba(255, 215, 130, 0.92);

    margin-right: 6px;
    transform: translateY(1px);

  /* "Powered by Xafai" footer under the welcome CTA. Matches the
     Tweaks-panel footer's uppercase tracking + low-emphasis treatment. */
  .vyke-welcome-footer {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    text-align: center;

  /* Floating dev banner pinned to the top of the viewport. We use
     `position: fixed` (NOT absolute) so the banner is immune to the
     `transform: scale(X)` that JS applies to `.stage` for fit-to-frame
     rendering — otherwise the banner would shrink along with the card.
     Hidden when the welcome modal is up (handled by body.vyke-locked).
     Sits BELOW the mobile topbar (z-index < 30) on small screens.
     The left/right anchors constrain the banner to the area LEFT of
     the 320 px Tweaks panel; `margin: 0 auto` + `width: fit-content`
     then centres the pill within that area so it never disappears
     behind the panel. */
  .vyke-dev-banner {
    position: fixed;
    top: 70px;                   /* clear of the 56 px header + 14 gap */
    left: 14px;
    right: 332px;                /* 320 panel + 16 right margin + 16 gap */
    margin-left: auto;
    margin-right: auto;
    width: fit-content;
    max-width: 100%;
    z-index: 15;
    /* Opaque dark fill so the banner is readable regardless of what
       sits underneath (was a translucent yellow tint that vanished
       against the white artboard when the card was zoomed / panned
       up under the banner). The yellow accent is now just the
       border + text colour. */
    background: rgba(28, 22, 8, 0.94);
    border: 1px solid rgba(255, 210, 100, 0.55);
    border-radius: 999px;
    padding: 6px 14px;
    color: #FFE0A0;
    font-size: 10.5px;
    letter-spacing: 0.02em;
    font-weight: 500;
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    backdrop-filter: blur(10px) saturate(140%);
    text-align: center;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    pointer-events: none;
    user-select: none;
    /* Truncate gracefully on narrow viewports rather than wrapping ugly */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vyke-dev-banner b { color: #fff; font-weight: 700; margin-right: 4px; }
  /* Hide the dev banner while the welcome modal blurs everything else;
     the welcome card already shows the same message internally. */
  body.vyke-locked .vyke-dev-banner { display: none; }

  /* Container that stacks one or more canvas-level overflow warnings
     vertically, pinned to the bottom of the viewport clear of the
     Tweaks panel. Each warning inside is a flex row with text + an
     action button. */
  .vyke-canvas-warnings {
    position: fixed;
    bottom: 60px;                /* above the centred canvas-nav pill */
    left: 14px;
    right: 332px;                /* clear of the 320 px Tweaks panel + gap */
    margin-left: auto;
    margin-right: auto;
    width: fit-content;
    max-width: 100%;
    z-index: 15;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  body.vyke-locked .vyke-canvas-warnings { display: none; }
  @media (max-width: 768px) {
    .vyke-canvas-warnings {
      bottom: 14px;
      right: 14px;
    }
  }

  .vyke-canvas-warning button {

  /* ─── Account chip (Tweaks panel header area) ───────────────────────── */

  /* ─── Shipping mark card — exact mm dimensions, drives WYSIWYG PDF ─── */
  .shipping-mark {
    --w-mm: 100;
    --h-mm: 70;
    --bleed-mm: 0;
    container-type: inline-size;
    position: relative;
    width: calc((var(--w-mm) + var(--bleed-mm) * 2) * 1mm);
    height: calc((var(--h-mm) + var(--bleed-mm) * 2) * 1mm);
    background: #fff;
    color: #000;
    overflow: hidden;
    box-shadow: 0 30px 80px -30px rgba(0,0,0,.25), 0 1px 0 rgba(0,0,0,.04);
  }
  /* Trim area inset by bleed; everything visible content lives inside this. */
  .sm-trim {
    position: absolute;
    left: calc(var(--bleed-mm) * 1mm);
    top: calc(var(--bleed-mm) * 1mm);
    width: calc(var(--w-mm) * 1mm);
    height: calc(var(--h-mm) * 1mm);
    padding: 4mm 5mm;
    display: flex;
    flex-direction: column;
    gap: 2.5mm;
    /* Hard clip so no element (icons, long brand text, oversized logo) can
       ever escape into the bleed area visually. The PDF render uses the
       same trim rectangle, so what you see is what prints. */
    overflow: hidden;
  }
  /* Trim outline — visible only when crop marks are on, used as an editor
     guide. Stripped from PDF (we draw real crop marks via jsPDF). */
  .sm-trim-guide {
    position: absolute;
    left: calc(var(--bleed-mm) * 1mm);
    top: calc(var(--bleed-mm) * 1mm);
    width: calc(var(--w-mm) * 1mm);
    height: calc(var(--h-mm) * 1mm);
    pointer-events: none;
    border: 0.2mm dashed rgba(0, 100, 200, 0.6);
    z-index: 5;
  }

  /* Header — brand name and optional logo */
  .sm-header {
    display: flex;
    align-items: center;
    gap: 3mm;
    min-height: 8mm;
  }
  .sm-brand-logo {
    max-height: 10mm;
    max-width: 30mm;

  /* Body layout: text rows on the left, icons hugging the right edge.
     Flex (not grid) so the rows column auto-shrinks to its content —
     when rows are empty, icons get the entire body width to spread
     into. `margin-left: auto` on .sm-icons keeps them anchored at the
     right edge regardless of how much space the rows column takes.
     The barcode is positioned absolutely (bottom-right of the trim
     area); `padding-right` reserves a column for it so body content
     can't slide horizontally underneath it. NO padding-bottom — the
     barcode only occupies the bottom-right corner, and padding-right
     already keeps content out of that column entirely, so icons can
     safely extend down to the body bottom on short cards. */

    flex: 1;
    display: flex;
    align-items: flex-start;

    min-height: 0;

       width (collapses to ~the "+ Add row" button when all rows are

       starve the icons block; the label wraps inside the column. */

    flex: 0 1 auto;
    min-width: 0;

     width. When there's room, they sit on one line; when the row is too
     narrow for both, value drops to its own line under the label (instead

     boundaries only — never mid-word — by leaving `overflow-wrap` at its
     default `normal` value. */

    display: flex;

    align-items: baseline;

     iconFit cap (computed in JS) constrains them when the body height
     is small. The block clips on overflow as a final safety so the
     icons never escape the trim area. */

    display: flex;
    flex-wrap: wrap;
    gap: 2mm;
    align-content: start;
    justify-content: flex-end;       /* right-align icons within the block */
    align-items: center;

  (function () {
    var btn = document.createElement("button");

    // its initial render, which on slower devices (especially mobile Safari)
    // can take well over 400 ms. A single fire-and-forget postMessage at a
    // fixed delay races against React mount — if the listener isn't attached

    // entire editor would be unreachable.
    //
    // Two complementary safety nets below:

    //      common-case fix that catches any mount delay.
    //   2. Retry the activation message up to ~3 s in case the handshake is

        e.stopPropagation();
        setOpen(card.hidden);
      });
    }
    card.querySelector(".hc-x").addEventListener("click", function () { setOpen(false); });
    document.addEventListener("click", function (e) {
      if (card.hidden) return;
      if (card.contains(e.target) || helpBtn.contains(e.target)) return;
      if (topbarHelp && topbarHelp.contains(e.target)) return;
      setOpen(false);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && !card.hidden) setOpen(false);
    });

    document.body.appendChild(card);
    document.body.appendChild(helpBtn);

    var seen = false;
    try { seen = localStorage.getItem(SEEN_KEY) === "1"; } catch (e) {}
    if (!seen) setTimeout(function () { setOpen(true); }, 900);
  })();
</script>
</body>
</html>
